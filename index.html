    .aud-tag-sector { background: #E6F4E0; color: #2D6B1A; }
    .aud-tag-geo { background: #E8EFE6; color: #3A6B35; }
    .aud-angle { font-size: 12px; color: #444; line-height: 1.55; border-top: 1px solid #C8DFC2; padding-top: 10px; margin-top: 4px; }
    .aud-angle strong { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #4A8C3F; margin-bottom: 3px; }
    .aud-list-table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid #B0C9A8; border-radius: 12px; overflow: hidden; }
    .aud-list-table th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #3A6B35; background: #E8EFE6; border-bottom: 1px solid #B0C9A8; }
    .aud-list-table td { padding: 12px 16px; border-bottom: 1px solid #C8DFC2; color: #1a1f1a; vertical-align: top; line-height: 1.5; }
    .aud-list-table tr:last-child td { border-bottom: none; }
    .aud-list-table td:first-child { border-left: 4px solid #4A8C3F; padding-left: 12px; }
    .aud-list-name { font-weight: 600; font-size: 13px; color: #1A3A1A; }
    .aud-list-titles { font-size: 12px; color: #3A6B35; margin-top: 2px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
    .info-card { background: #fff; border: 1px solid #B0C9A8; border-radius: 12px; padding: 18px 20px; }
    .info-card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #4A8C3F; margin-bottom: 12px; }
    .info-row { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 6px 0; border-bottom: 1px solid #E8EFE6; font-size: 13px; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: #3A6B35; font-weight: 500; flex-shrink: 0; }
    .info-value { color: #1A3A1A; text-align: right; font-size: 12px; }
    .info-value.green { color: #2D6B1A; font-weight: 600; }
    .stack-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; border: 1px solid #B0C9A8; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
    .stack-table th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #3A6B35; background: #E8EFE6; border-bottom: 1px solid #B0C9A8; }
    .stack-table td { padding: 11px 16px; border-bottom: 1px solid #C8DFC2; vertical-align: top; color: #1a1f1a; font-size: 13px; line-height: 1.5; }
    .stack-table tr:last-child td { border-bottom: none; }
    .stack-table td:first-child { font-weight: 600; color: #1A3A1A; white-space: nowrap; }
    .status-pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .status-active  { background: #E6F4E0; color: #2D6B1A; }
    .status-planned { background: #FDF3DC; color: #7A5200; }
    .empty-state { text-align: center; padding: 56px 20px; color: #3A6B35; font-size: 14px; }
    #loading { text-align: center; padding: 60px; color: #4A8C3F; font-size: 14px; }
  </style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">Black Tech Capital <span>/ Comms Review</span></div>
    <div class="gate-subtitle">Communications &amp; marketing tracker — team access only</div>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')checkPw()" />
    <button class="gate-btn" onclick="checkPw()">Enter</button>
    <div class="gate-error" id="gate-error">Incorrect password. Please try again.</div>
  </div>
</div>
<div id="app">
  <div class="site-header">
    <div class="site-logo">Black Tech Capital <span>/ Comms &amp; Marketing</span></div>
    <div class="header-meta" id="last-updated">Loading...</div>
  </div>
  <div class="tabs-bar">
    <div class="tab active" onclick="switchTab('campaigns',this)">Campaigns <span class="tab-badge badge-pending" id="count-pending">—</span></div>
    <div class="tab" onclick="switchTab('initiatives',this)">Initiatives <span class="tab-badge badge-initiative" id="count-initiatives">—</span></div>
    <div class="tab" onclick="switchTab('pipeline',this)">Pipeline <span class="tab-badge badge-pipeline" id="count-pipeline">—</span></div>
    <div class="tab" onclick="switchTab('reports',this)">Weekly Reports <span class="tab-badge badge-reports" id="count-reports">—</span></div>
    <div class="tab" onclick="switchTab('audiences',this)">Audiences <span class="tab-badge badge-audience" id="count-audiences">—</span></div>
    <div class="tab" onclick="switchTab('sysinfo',this)">System Info <span class="tab-badge badge-info">&#9432;</span></div>
  </div>
  <div class="main">
    <div id="loading">Loading...</div>
    <div id="campaigns"   class="tab-content" style="display:none;"></div>
    <div id="initiatives" class="tab-content" style="display:none;"></div>
    <div id="pipeline"    class="tab-content" style="display:none;"></div>
    <div id="reports"     class="tab-content" style="display:none;"></div>
    <div id="audiences"   class="tab-content" style="display:none;"></div>
    <div id="sysinfo"     class="tab-content" style="display:none;"></div>
  </div>
</div>
<script>
  const SITE_PASSWORD = 'btc2026';
  const REPO_RAW   = 'https://raw.githubusercontent.com/keyona-rerev/btc-comms-review/main';
  const PAGES_BASE = 'https://keyona-rerev.github.io/btc-comms-review';

  let audView = 'card';
  let campFilter = 'all';
  let campView = 'cards';
  let allCampaigns = [];
  let allRejections = [];
  let allInitiatives = [];
  let allFormats = [];
  let reportWeeks = [];
  let reportsCache = {};
  let currentReportWeek = null;

  function checkPw() {
    if (document.getElementById('pw-input').value === SITE_PASSWORD) {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      loadData();
    } else {
      document.getElementById('gate-error').style.display = 'block';
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }

  async function loadData() {
    try {
      const ts = '?t=' + Date.now();
      const [campRes, rejRes, audRes, pipeRes, fmtRes, iniRes] = await Promise.all([
        fetch(REPO_RAW + '/campaigns.json' + ts),
        fetch(REPO_RAW + '/rejections.json' + ts),
        fetch(REPO_RAW + '/audiences.json' + ts),
        fetch(REPO_RAW + '/pipeline.json' + ts),
        fetch(REPO_RAW + '/content_formats.json' + ts),
        fetch(REPO_RAW + '/initiatives.json' + ts)
      ]);
      const campData = await campRes.json();
      const rejData  = await rejRes.json();
      const audData  = await audRes.json();
      const pipeData = await pipeRes.json();
      const fmtData  = await fmtRes.json();
      const iniData  = await iniRes.json();
      allCampaigns   = campData.campaigns  || [];
      allRejections  = rejData.rejections  || [];
      allInitiatives = iniData.initiatives || [];
      allFormats     = fmtData.formats     || [];
      window._allInitiatives = allInitiatives;
      window._allFormats     = allFormats;
      reportWeeks = await discoverReportWeeks();
      render(allCampaigns, allRejections, audData.audiences || [], pipeData, allFormats, allInitiatives);
    } catch(e) {
      document.getElementById('loading').textContent = 'Failed to load. Please refresh. (' + e.message + ')';
    }
  }

  async function discoverReportWeeks() {
    const found = [];
    for (let n = 1; n <= 52; n++) {
      try {
        const res = await fetch(REPO_RAW + '/reports/week-' + n + '.json?t=' + Date.now());
        if (!res.ok) break;
        const data = await res.json();
        reportsCache[n] = data;
        found.push(n);
      } catch(e) { break; }
    }
    return found;
  }

  function render(campaigns, rejections, audiences, pipeData, formats, initiatives) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('count-pending').textContent     = campaigns.length || '0';
    document.getElementById('count-initiatives').textContent = initiatives.length || '0';
    document.getElementById('count-audiences').textContent   = audiences.length;
    document.getElementById('count-pipeline').textContent    = (pipeData.pipeline || []).length || '0';
    document.getElementById('count-reports').textContent     = reportWeeks.length > 0 ? reportWeeks.length + ' wk' : '0';
    const now = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    document.getElementById('last-updated').textContent = 'keyona@rerev.io · ' + now;
    renderCampaignsTab(campaigns, rejections);
    renderInitiativesTab(initiatives, campaigns, formats);
    renderPipelineTab(pipeData);
    renderReportsTab();
    renderAudiencesTab(audiences, campaigns);
    renderSysInfo(campaigns);
    document.getElementById('campaigns').classList.add('active');
    document.getElementById('campaigns').style.display = 'block';
  }

  function switchTab(id, el) {
    document.querySelectorAll('.tab-content').forEach(t => { t.style.display = 'none'; t.classList.remove('active'); });
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  }

  /* ---- CAMPAIGNS ---- */
  function renderCampaignsTab(campaigns, rejections) {
    const el = document.getElementById('campaigns');
    const rejMap = {};
    rejections.forEach(r => { rejMap[r.id] = r.reason; });
    campaigns.forEach(c => { if (c.status === 'rejected' && rejMap[c.id]) c._rejectionReason = rejMap[c.id]; });
    el.innerHTML = `
      <div class="camp-toolbar">
        <div class="camp-toolbar-left">
          <select class="seq-filter" id="camp-filter-select" onchange="campFilter=this.value;renderCampView()">
            <option value="all">All campaigns</option>
            <option value="pending">Awaiting Review</option>
            <option value="approved">Approved</option>
            <option value="rejected">Flagged</option>
            <option value="waiting">Waiting on Them</option>
            <option value="blocked">Legitimate Blocker</option>
            <option value="move">Time to Move</option>
          </select>
          <div class="seq-count-note" id="camp-count-note"></div>
        </div>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-cards" onclick="setCampView('cards')">&#9632; Cards</button>
          <button class="view-btn" id="btn-board" onclick="setCampView('board')">&#9638; Board</button>
        </div>
      </div>
      <div id="camp-view-area"></div>
    `;
    window._allCamps = campaigns;
    renderCampView();
  }

  function setCampView(v) {
    campView = v;
    document.getElementById('btn-cards').classList.toggle('active', v === 'cards');
    document.getElementById('btn-board').classList.toggle('active', v === 'board');
    renderCampView();
  }

  function getFilteredCamps() {
    const camps = window._allCamps || [];
    if (campFilter === 'all')      return camps;
    if (campFilter === 'pending')  return camps.filter(c => c.status === 'pending');
    if (campFilter === 'approved') return camps.filter(c => c.status === 'approved');
    if (campFilter === 'rejected') return camps.filter(c => c.status === 'rejected');
    if (campFilter === 'waiting')  return camps.filter(c => c.outreachStatus === 'waiting');
    if (campFilter === 'blocked')  return camps.filter(c => c.outreachStatus === 'blocked');
    if (campFilter === 'move')     return camps.filter(c => c.outreachStatus === 'needs_send' || !c.outreachStatus);
    return camps;
  }

  function renderCampView() {
    const filtered = getFilteredCamps();
    const note = document.getElementById('camp-count-note');
    if (note) note.textContent = filtered.length + ' campaign' + (filtered.length !== 1 ? 's' : '');
    const area = document.getElementById('camp-view-area');
    if (!area) return;
    if (!filtered.length) { area.innerHTML = '<div class="empty-state"><strong>No campaigns match this filter.</strong></div>'; return; }
    if (campView === 'board') {
      const waiting = filtered.filter(c => c.outreachStatus === 'waiting');
      const blocked = filtered.filter(c => c.outreachStatus === 'blocked');
      const move    = filtered.filter(c => c.outreachStatus === 'needs_send' || !c.outreachStatus);
      function boardCol(label, sub, cls, dotCls, items, detailKey, detailLabel) {
        const cards = items.length ? items.map(c => {
          const det = c[detailKey] ? '<div class="status-card-detail"><strong>' + detailLabel + '</strong>' + escHtml(c[detailKey]) + '</div>' : '';
          return '<div class="status-card"><div class="status-card-title">' + escHtml(c.title) + '</div><div class="status-card-org">' + escHtml(c.contactOrg || c.targetAudience || '') + (c.from ? ' &middot; ' + escHtml(c.from) : '') + '</div>' + det + '</div>';
        }).join('') : '<div class="status-empty">None right now.</div>';
        return '<div class="status-col ' + cls + '"><div class="status-col-header"><span class="status-dot ' + dotCls + '"></span>' + label + ' <span class="status-col-count">' + items.length + '</span></div><div class="status-col-sub">' + sub + '</div>' + cards + '</div>';
      }
      area.innerHTML = '<div class="status-columns">' +
        boardCol('Waiting on Them', 'You sent something. Ball is in their court.', 'status-col-waiting', 'dot-waiting', waiting, 'waitingOn', 'Waiting on') +
        boardCol('Legitimate Blocker', 'Something real is in the way.', 'status-col-blocked', 'dot-blocked', blocked, 'blocker', 'Blocker') +
        boardCol('Time to Move', 'Outreach not sent yet. Your attention goes here.', 'status-col-move', 'dot-move', move, 'webinarAngle', 'Angle') +
        '</div>';
    } else {
      const sorted = [
        ...filtered.filter(c => c.status === 'pending'),
        ...filtered.filter(c => c.status === 'approved'),
        ...filtered.filter(c => c.status === 'rejected')
      ];
      area.innerHTML = sorted.map(c => renderCampCard(c)).join('');
    }
  }

  const TYPE_BADGE_MAP = { email:'badge-email', linkedin:'badge-linkedin', content:'badge-content', event:'badge-event', pr:'badge-pr' };
  const TYPE_LABEL_MAP = { email:'Email', linkedin:'LinkedIn', content:'Content', event:'Event', pr:'PR / Press' };

  function outreachPill(camp) {
    const s = camp.outreachStatus;
    if (s === 'waiting')    return '<span class="outreach-pill outreach-waiting">Waiting on Them</span>';
    if (s === 'blocked')    return '<span class="outreach-pill outreach-blocked">Blocker</span>';
    if (s === 'needs_send' || !s) return '<span class="outreach-pill outreach-move">Time to Move</span>';
    return '';
  }

  function renderCampCard(camp) {
    const ini = (window._allInitiatives || []).find(i => i.id === camp.sc_initiative_id);
    const iniStrip = ini ? '<div class="ini-context-strip"><strong>Initiative</strong>' + escHtml(ini.name) + ' — ' + escHtml(ini.goal) + '</div>' : '';
    const intelStrip = camp.contactIntel ? '<div class="contact-intel-strip"><strong>Contact Intel</strong>' + escHtml(camp.contactIntel) + '</div>' : '';
    const status = camp.status || 'pending';
    const pillClass = status === 'approved' ? 'pill-approved' : status === 'rejected' ? 'pill-rejected' : 'pill-pending';
    const pillLabel = status === 'approved' ? 'Approved' : status === 'rejected' ? 'Flagged' : 'Awaiting Review';
    const typeKey = (camp.type || 'content').toLowerCase();
    const typeBadge = '<span class="type-badge ' + (TYPE_BADGE_MAP[typeKey] || 'badge-content') + '">' + (TYPE_LABEL_MAP[typeKey] || camp.type) + '</span>';
    const fromTag = camp.from ? ' &middot; From: ' + escHtml(camp.from) : '';
    const cadence = camp.cadence ? ' &middot; ' + camp.cadence : '';
    const viewBtn = camp.campaignFile ? '<a class="btn btn-view" href="' + PAGES_BASE + '/' + camp.campaignFile + '" target="_blank">View campaign</a>' : '';
    const feedbackBtn = status === 'pending' ? '<a class="btn btn-feedback" href="https://github.com/keyona-rerev/btc-comms-review/issues/new?title=Feedback%3A+' + encodeURIComponent(camp.title) + '&body=**Campaign+ID:**+' + camp.id + '%0A%0A**Feedback:**%0A" target="_blank">Leave feedback</a>' : '';
    const approvedNote = status === 'approved' && camp.approvalNote ? '<div class="approved-note"><strong>Why it worked</strong>' + escHtml(camp.approvalNote) + '</div>' : '';
    const rejectedNote = status === 'rejected' && (camp.rejectionReason || camp._rejectionReason) ? '<div class="rejection-note"><strong>Bryan\'s feedback</strong>' + escHtml(camp.rejectionReason || camp._rejectionReason) + '</div>' : '';
    const usageNote = camp.usageNote ? '<div class="usage-note">' + escHtml(camp.usageNote) + '</div>' : '';
    const angleNote = camp.webinarAngle ? '<div class="angle-note"><strong>Webinar angle</strong>' + escHtml(camp.webinarAngle) + '</div>' : '';
    const blockerNote = camp.outreachStatus === 'blocked' && camp.blocker ? '<div class="rejection-note"><strong>Blocker</strong>' + escHtml(camp.blocker) + '</div>' : '';
    const draftId = 'draft-' + camp.id;
    const draftHtml = camp.emailDraft ? '<span class="draft-toggle" onclick="toggleDraft(\'' + draftId + '\', this)">&#9660; View email draft</span><div class="draft-block" id="' + draftId + '">' + escHtml(camp.emailDraft) + '</div>' : '';
    return '<div class="card"><div class="card-top"><div><div class="card-title">' + escHtml(camp.title) + '</div>' + (camp.targetAudience ? '<div class="card-audience">' + escHtml(camp.targetAudience) + '</div>' : '') + '<div class="card-meta">' + escHtml(camp.pushedDate || '') + cadence + fromTag + ' ' + typeBadge + outreachPill(camp) + '</div></div><span class="status-pill-seq ' + pillClass + '">' + pillLabel + '</span></div>' + iniStrip + intelStrip + usageNote + angleNote + blockerNote + approvedNote + rejectedNote + draftHtml + '<div class="card-actions">' + viewBtn + feedbackBtn + '</div></div>';
  }

  function toggleDraft(id, btn) {
    const el = document.getElementById(id);
    if (!el) return;
    const open = el.style.display === 'block';
    el.style.display = open ? 'none' : 'block';
    btn.textContent = open ? '\u25bc View email draft' : '\u25b2 Hide email draft';
  }

  /* ---- INITIATIVES ---- */
  function renderInitiativesTab(initiatives, campaigns, formats) {
    const el = document.getElementById('initiatives');
    if (!initiatives.length) { el.innerHTML = '<div class="empty-state"><strong>No initiatives yet.</strong></div>'; return; }
    const fmtMap = {};
    formats.forEach(f => { fmtMap[f.id] = f; });
    const ORDER = { Critical: 0, High: 1, Medium: 2, Low: 3 };
    const sorted = [...initiatives].sort((a, b) => (ORDER[a.priority] ?? 9) - (ORDER[b.priority] ?? 9));

    el.innerHTML = '<div class="section-label">' + sorted.length + ' initiative' + (sorted.length !== 1 ? 's' : '') + '</div>' + sorted.map(ini => {
      const statusKey = (ini.status || '').toLowerCase().replace(/\s/g, '');
      const statusCls = statusKey === 'active' ? 'ini-status-active' : statusKey === 'planning' ? 'ini-status-planning' : 'ini-status-braindump';
      const priCls = ini.priority === 'Critical' ? 'ini-priority-critical' : ini.priority === 'High' ? 'ini-priority-high' : 'ini-priority-medium';
      const question = ini.core_question ? '<div class="ini-question"><strong>Core question</strong>' + escHtml(ini.core_question) + '</div>' : '';
      const notes = ini.notes ? '<div class="ini-notes"><strong>Notes</strong>' + escHtml(ini.notes) + '</div>' : '';

      // Trigger + typical titles strip
      const metaStrip = (ini.trigger || (ini.typicalTitles && ini.typicalTitles.length))
        ? '<div style="font-size:11px;color:#3A6B35;margin-bottom:10px;">' +
          (ini.trigger ? '<span style="font-weight:600;">Trigger:</span> ' + escHtml(ini.trigger) : '') +
          (ini.trigger && ini.typicalTitles && ini.typicalTitles.length ? ' &middot; ' : '') +
          (ini.typicalTitles && ini.typicalTitles.length ? '<span style="font-weight:600;">Typical titles:</span> ' + ini.typicalTitles.map(t => escHtml(t)).join(', ') : '') +
          '</div>'
        : '';

      // Campaigns + contacts
      const allLinked = campaigns.filter(c => c.sc_initiative_id === ini.id || (ini.linked_campaigns || []).includes(c.id));
      const uniqueLinked = [...new Map(allLinked.map(c => [c.id, c])).values()];
      const contactSection = uniqueLinked.length
        ? '<hr class="ini-section-divider"><span class="ini-section-label">Campaigns &amp; Contacts (' + uniqueLinked.length + ')</span>' +
          uniqueLinked.map(c => {
            const personLine = c.contactPerson ? escHtml(c.contactPerson) + (c.contactTitle ? ', ' + escHtml(c.contactTitle) : '') : '';
            const intel = c.contactIntel ? '<div class="ini-contact-intel">' + escHtml(c.contactIntel) + '</div>' : '';
            const outreach = c.outreachStatus === 'waiting' ? '<span style="font-size:10px;color:#2D6B1A;font-weight:600;">Waiting on them</span>'
              : c.outreachStatus === 'blocked' ? '<span style="font-size:10px;color:#8B3A1A;font-weight:600;">Blocker</span>'
              : '<span style="font-size:10px;color:#7A5200;font-weight:600;">Time to move</span>';
            return '<div class="ini-contact-card"><div class="ini-contact-name">' + escHtml(c.contactOrg || c.title) + ' ' + outreach + '</div>' + (personLine ? '<div class="ini-contact-title">' + personLine + '</div>' : '') + intel + '</div>';
          }).join('')
        : '';

      // Content formats — collapsible, only if ini has them
      const linkedFmts = (ini.contentFormats || []).map(fid => fmtMap[fid]).filter(Boolean);
      const fmtSection = linkedFmts.length
        ? '<hr class="ini-section-divider"><div class="fmt-toggle-bar" onclick="toggleFmt(\'' + ini.id + '\')"><span class="fmt-toggle-label">Content Formats (' + linkedFmts.length + ')</span><span class="fmt-toggle-icon" id="fmticon-' + ini.id + '">&#9660;</span></div><div class="fmt-panel" id="fmtpanel-' + ini.id + '">' +
          linkedFmts.map(f => {
            const sc = f.status === 'In Development' ? 'fmt-status-dev' : 'fmt-status-concept';
            const ol = (f.contentOutline || []).map(i => '<li>' + escHtml(i) + '</li>').join('');
            return '<div class="fmt-card"><div class="fmt-header"><div><div class="fmt-name">' + escHtml(f.name) + '</div><div class="fmt-meta">' + escHtml(f.duration || '') + '</div></div><span class="fmt-status ' + sc + '">' + escHtml(f.status) + '</span></div><div class="fmt-value-prop">' + escHtml(f.valueProp || '') + '</div><div class="fmt-section">Content outline</div><ul class="fmt-outline">' + ol + '</ul><div class="fmt-section">Co-host angle</div><div class="fmt-cohost">' + escHtml(f.coHostAngle || '') + '</div></div>';
          }).join('') + '</div>'
        : '';

      return '<div class="ini-card"><div class="ini-card-top"><div><div class="ini-name">' + escHtml(ini.name) + '</div><div class="ini-timeline">' + escHtml(ini.timeline || '') + '</div></div><div class="ini-pills"><span class="ini-status-pill ' + statusCls + '">' + escHtml(ini.status) + '</span><span class="' + priCls + '">' + escHtml(ini.priority) + '</span></div></div><div class="ini-goal">' + escHtml(ini.goal) + '</div>' + metaStrip + question + notes + contactSection + fmtSection + '<div class="ini-id">' + escHtml(ini.id) + '</div></div>';
    }).join('');
  }

  function toggleFmt(iniId) {
    const panel = document.getElementById('fmtpanel-' + iniId);
    const icon  = document.getElementById('fmticon-' + iniId);
    if (!panel) return;
    const open = panel.style.display === 'block';
    panel.style.display = open ? 'none' : 'block';
    if (icon) icon.classList.toggle('open', !open);
  }

  /* ---- PIPELINE ---- */
  function renderPipelineTab(pipeData) {
    const el = document.getElementById('pipeline');
    const meta = pipeData.meta || {};
    const pipeline = pipeData.pipeline || [];
    const sourcing = pipeline.filter(p => p.bucket === 'sourcing');
    const active   = pipeline.filter(p => p.bucket === 'active');
    const nurture  = pipeline.filter(p => p.bucket === 'nurture');
    const hdr = '<div class="pipeline-header"><div><div class="pipeline-batch-name">' + escHtml(meta.current_batch || '') + '</div><div class="pipeline-statement">' + escHtml(meta.focus || '') + '</div></div><div class="pipeline-meta">' + (meta.last_updated ? 'Last updated: <strong>' + escHtml(meta.last_updated) + '</strong>' : '') + '</div></div>';
    const cols = [{ label: 'Sourcing', cls: 'col-sourcing', items: sourcing }, { label: 'Active Comms', cls: 'col-active', items: active }, { label: 'Nurture / Watch', cls: 'col-nurture', items: nurture }];
    el.innerHTML = hdr + '<div class="pipeline-board">' + cols.map(col => '<div class="pipeline-col ' + col.cls + '"><div class="pipeline-col-header">' + col.label + ' <span class="col-count">' + col.items.length + '</span></div>' + (col.items.length ? col.items.map(p => {
      const typeTag = p.type ? '<span class="pcard-tag pcard-tag-type">' + escHtml(p.type) + '</span>' : '';
      const sectorTag = p.sector ? '<span class="pcard-tag pcard-tag-sector">' + escHtml(p.sector) + '</span>' : '';
      const connTag = p.connection ? '<span class="pcard-tag pcard-tag-conn">&#10003; ' + escHtml(p.connection) + '</span>' : '';
      const sig = p.signals && p.signals.length ? '<div class="pcard-signals"><strong>Context</strong>' + p.signals.map(s => escHtml(s)).join(' &middot; ') + '</div>' : '';
      return '<div class="pcard"><div class="pcard-name">' + escHtml(p.name || '') + '</div><div class="pcard-loc">' + escHtml(p.location || '') + '</div><div class="pcard-tags">' + typeTag + sectorTag + connTag + '</div>' + sig + '</div>';
    }).join('') : '<div class="pcard-empty">No entries yet</div>') + '</div>').join('') + '</div>';
  }

  /* ---- REPORTS ---- */
  function renderReportsTab() {
    const el = document.getElementById('reports');
    if (!reportWeeks.length) { el.innerHTML = '<div class="reports-no-data"><strong>No reports yet.</strong><p>Add reports/week-1.json to populate.</p></div>'; return; }
    currentReportWeek = reportWeeks[reportWeeks.length - 1];
    const opts = reportWeeks.slice().reverse().map(n => '<option value="' + n + '"' + (n === currentReportWeek ? ' selected' : '') + '>Week ' + n + '</option>').join('');
    el.innerHTML = '<div class="reports-toolbar"><select class="reports-week-select" onchange="selectReportWeek(parseInt(this.value))">' + opts + '</select><div class="seq-count-note">' + reportWeeks.length + ' week(s)</div></div><div id="report-body"></div>';
    renderReportBody(currentReportWeek);
  }

  function selectReportWeek(n) { currentReportWeek = n; renderReportBody(n); }

  function renderReportBody(n) {
    const body = document.getElementById('report-body');
    if (!body) return;
    const data = reportsCache[n];
    if (!data) { body.innerHTML = '<div class="reports-no-data"><strong>No data for Week ' + n + '.</strong></div>'; return; }
    let html = '<div class="report-week-label">Week ' + n + (data.date_range ? ' · ' + escHtml(data.date_range) : '') + '</div>';
    if (data.highlights && data.highlights.length) html += '<div class="report-block"><div class="report-block-title">Highlights</div><ul style="padding-left:18px;font-size:13px;line-height:1.7;">' + data.highlights.map(h => '<li style="margin-bottom:6px;">' + escHtml(h) + '</li>').join('') + '</ul></div>';
    if (data.next_steps && data.next_steps.length) html += '<div class="report-block"><div class="report-block-title">Next steps</div><ul style="padding-left:18px;font-size:13px;line-height:1.7;">' + data.next_steps.map(h => '<li style="margin-bottom:6px;">' + escHtml(h) + '</li>').join('') + '</ul></div>';
    if (data.notes) html += '<div class="report-block"><div class="report-block-title">Notes</div><div class="report-note">' + escHtml(data.notes) + '</div></div>';
    body.innerHTML = html;
  }

  /* ---- AUDIENCES ---- */
  function renderAudiencesTab(audiences, campaigns) {
    const el = document.getElementById('audiences');
    el.innerHTML = '<div class="aud-toolbar"><div class="section-label" style="margin:0;">' + audiences.length + ' audience profile(s)</div><div class="view-toggle"><button class="view-btn active" id="aud-card-btn" onclick="setAudView(\'card\')">Cards</button><button class="view-btn" id="aud-list-btn" onclick="setAudView(\'list\')">List</button></div></div><div id="aud-card-view" class="aud-grid">' + audiences.map(a => renderAudCard(a, campaigns)).join('') + '</div><div id="aud-list-view" style="display:none;">' + renderAudList(audiences, campaigns) + '</div>';
  }

  function setAudView(v) {
    audView = v;
    document.getElementById('aud-card-view').style.display = v === 'card' ? 'grid' : 'none';
    document.getElementById('aud-list-view').style.display = v === 'list' ? 'block' : 'none';
    document.getElementById('aud-card-btn').classList.toggle('active', v === 'card');
    document.getElementById('aud-list-btn').classList.toggle('active', v === 'list');
  }

  function renderAudCard(a, campaigns) {
    const linked = campaigns.filter(c => (a.campaigns || []).includes(c.id));
    const seqLink = linked.length ? '<div style="margin-top:10px;"><span style="font-size:11px;color:#4A8C3F;font-weight:600;">' + linked.length + ' campaign(s)</span></div>' : '';
    return '<div class="aud-card"><div class="aud-segment">' + escHtml(a.segment || '') + '</div><div class="aud-name">' + escHtml(a.name) + '</div><div class="aud-titles">' + escHtml(a.typicalTitles || '') + '</div><div class="aud-tags">' + (a.sectors || []).map(s => '<span class="aud-tag aud-tag-sector">' + escHtml(s) + '</span>').join('') + (a.geos || []).map(g => '<span class="aud-tag aud-tag-geo">' + escHtml(g) + '</span>').join('') + '</div><div class="aud-angle"><strong>Angle</strong>' + escHtml(a.angle || '') + '</div>' + seqLink + '</div>';
  }

  function renderAudList(audiences, campaigns) {
    return '<table class="aud-list-table"><thead><tr><th>Audience</th><th>Typical Titles</th><th>Angle</th><th>Campaigns</th></tr></thead><tbody>' + audiences.map(a => {
      const linked = campaigns.filter(c => (a.campaigns || []).includes(c.id));
      return '<tr><td><div class="aud-list-name">' + escHtml(a.name) + '</div><div class="aud-list-titles">' + escHtml(a.segment || '') + '</div></td><td>' + escHtml(a.typicalTitles || '') + '</td><td>' + escHtml(a.angle || '') + '</td><td>' + (linked.length ? linked.length + ' campaign(s)' : 'None yet') + '</td></tr>';
    }).join('') + '</tbody></table>';
  }

  /* ---- SYS INFO ---- */
  function renderSysInfo(campaigns) {
    const el = document.getElementById('sysinfo');
    const pending  = campaigns.filter(c => c.status === 'pending').length;
    const approved = campaigns.filter(c => c.status === 'approved').length;
    const rejected = campaigns.filter(c => c.status === 'rejected').length;
    el.innerHTML = '<div class="info-grid"><div class="info-card"><div class="info-card-title">Campaign Summary</div><div class="info-row"><span class="info-label">Total campaigns</span><span class="info-value">' + campaigns.length + '</span></div><div class="info-row"><span class="info-label">Awaiting review</span><span class="info-value">' + pending + '</span></div><div class="info-row"><span class="info-label">Approved</span><span class="info-value green">' + approved + '</span></div><div class="info-row"><span class="info-label">Flagged</span><span class="info-value">' + rejected + '</span></div></div><div class="info-card"><div class="info-card-title">Portal Info</div><div class="info-row"><span class="info-label">Repo</span><span class="info-value">keyona-rerev/btc-comms-review</span></div><div class="info-row"><span class="info-label">Access</span><span class="info-value green">Authenticated</span></div><div class="info-row"><span class="info-label">Reviewer</span><span class="info-value">Bryan Duarte</span></div></div></div><table class="stack-table"><thead><tr><th>Tool</th><th>Role</th><th>Status</th></tr></thead><tbody><tr><td>Railway / Super Connector</td><td>Warm contact CRM</td><td><span class="status-pill status-active">Active</span></td></tr><tr><td>Apollo / Pipedrive</td><td>Cold outreach</td><td><span class="status-pill status-active">Active</span></td></tr><tr><td>GitHub Pages</td><td>Portal hosting</td><td><span class="status-pill status-active">Active</span></td></tr><tr><td>Google Tasks</td><td>Action items</td><td><span class="status-pill status-active">Active</span></td></tr></tbody></table>';
  }

  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
